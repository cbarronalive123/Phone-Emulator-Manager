name: Build macOS Application

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller Pillow

    - name: Convert Icon to ICNS
      run: |
        # Generate iconset and icns using built-in macOS tools
        mkdir MyIcon.iconset
        sips -z 16 16     icons/phone_icon_green.png --out MyIcon.iconset/icon_16x16.png
        sips -z 32 32     icons/phone_icon_green.png --out MyIcon.iconset/icon_16x16@2x.png
        sips -z 32 32     icons/phone_icon_green.png --out MyIcon.iconset/icon_32x32.png
        sips -z 64 64     icons/phone_icon_green.png --out MyIcon.iconset/icon_32x32@2x.png
        sips -z 128 128   icons/phone_icon_green.png --out MyIcon.iconset/icon_128x128.png
        sips -z 256 256   icons/phone_icon_green.png --out MyIcon.iconset/icon_128x128@2x.png
        sips -z 256 256   icons/phone_icon_green.png --out MyIcon.iconset/icon_256x256.png
        sips -z 512 512   icons/phone_icon_green.png --out MyIcon.iconset/icon_256x256@2x.png
        sips -z 512 512   icons/phone_icon_green.png --out MyIcon.iconset/icon_512x512.png
        sips -z 1024 1024 icons/phone_icon_green.png --out MyIcon.iconset/icon_512x512@2x.png
        iconutil -c icns MyIcon.iconset
        mv MyIcon.icns icon.icns

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --windowed --noconfirm --name "Phone Emulator Manager" --icon "icon.icns" --add-data "icons:icons" main.py

    - name: Create DMG
      run: |
        brew install create-dmg
        cd dist
        create-dmg \
          --volname "Phone Emulator Manager" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "Phone Emulator Manager.app" 200 190 \
          --hide-extension "Phone Emulator Manager.app" \
          --app-drop-link 600 185 \
          "PhoneEmulatorManager_Mac.dmg" \
          "Phone Emulator Manager.app"

    - name: Upload DMG to Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload v1.0.0 dist/PhoneEmulatorManager_Mac.dmg --clobber
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneEmulatorManager-Mac
        path: dist/PhoneEmulatorManager_Mac.dmg
